<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <!-- Body -->
  <rect x="8" y="45" width="170" height="65" rx="8" fill="#FDD835"/>
  <!-- Front nose -->
  <path d="M178 55 Q192 58 192 80 L192 100 Q178 105 178 110Z" fill="#F9A825"/>
  <!-- Windshield -->
  <path d="M180 58 Q188 60 188 78 L188 96 Q180 100 180 98Z" fill="#B3E5FC"/>
  <!-- Windows -->
  <rect x="18" y="52" width="25" height="22" rx="4" fill="#B3E5FC"/>
  <rect x="50" y="52" width="25" height="22" rx="4" fill="#B3E5FC"/>
  <rect x="82" y="52" width="25" height="22" rx="4" fill="#B3E5FC"/>
  <rect x="114" y="52" width="25" height="22" rx="4" fill="#B3E5FC"/>
  <rect x="146" y="52" width="25" height="22" rx="4" fill="#B3E5FC"/>
  <!-- Door -->
  <rect x="18" y="78" width="22" height="32" rx="4" fill="#F9A825"/>
  <line x1="29" y1="78" x2="29" y2="110" stroke="#FDD835" stroke-width="2"/>
  <!-- Black stripe -->
  <rect x="8" y="78" width="170" height="6" fill="#212121"/>
  <!-- "SCHOOL BUS" text -->
  <text x="100" y="100" text-anchor="middle" font-size="8" font-weight="bold" fill="#212121" letter-spacing="1.5">SCHOOL BUS</text>
  <!-- Stop sign arm -->
  <rect x="162" y="52" width="4" height="28" rx="2" fill="#E53935"/>
  <polygon points="166,52 174,56 174,68 166,72 158,68 158,56" fill="#E53935" stroke="white" stroke-width="1.5"/>
  <text x="166" y="66" text-anchor="middle" font-size="6" font-weight="bold" fill="white">STOP</text>
  <!-- Wheels -->
  <circle cx="48" cy="116" r="17" fill="#212121"/>
  <circle cx="48" cy="116" r="10" fill="#424242"/>
  <circle cx="48" cy="116" r="4" fill="#9E9E9E"/>
  <circle cx="150" cy="116" r="17" fill="#212121"/>
  <circle cx="150" cy="116" r="10" fill="#424242"/>
  <circle cx="150" cy="116" r="4" fill="#9E9E9E"/>
  <!-- Front bumper -->
  <rect x="186" y="88" width="10" height="18" rx="3" fill="#9E9E9E"/>
</svg>
