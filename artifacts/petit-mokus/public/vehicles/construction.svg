<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <!-- Dump truck bed -->
  <rect x="10" y="40" width="105" height="65" rx="6" fill="#FFC107"/>
  <!-- Bed tilt suggestion -->
  <path d="M115 40 L115 105 L10 105 L10 40Z" fill="#FFB300" opacity="0.4"/>
  <!-- Cab -->
  <rect x="115" y="60" width="55" height="45" rx="6" fill="#F57F17"/>
  <!-- Cab roof -->
  <rect x="118" y="52" width="48" height="15" rx="4" fill="#F57F17"/>
  <!-- Window -->
  <rect x="128" y="65" width="30" height="20" rx="4" fill="#B3E5FC"/>
  <!-- Warning stripes on bed -->
  <rect x="10" y="40" width="105" height="8" rx="0" fill="#212121"/>
  <line x1="22" y1="40" x2="14" y2="48" stroke="#FFC107" stroke-width="4"/>
  <line x1="36" y1="40" x2="22" y2="48" stroke="#FFC107" stroke-width="4"/>
  <line x1="50" y1="40" x2="36" y2="48" stroke="#FFC107" stroke-width="4"/>
  <line x1="64" y1="40" x2="50" y2="48" stroke="#FFC107" stroke-width="4"/>
  <line x1="78" y1="40" x2="64" y2="48" stroke="#FFC107" stroke-width="4"/>
  <line x1="92" y1="40" x2="78" y2="48" stroke="#FFC107" stroke-width="4"/>
  <line x1="106" y1="40" x2="92" y2="48" stroke="#FFC107" stroke-width="4"/>
  <!-- Hydraulic arm -->
  <rect x="108" y="55" width="10" height="50" rx="3" fill="#795548"/>
  <!-- Exhaust -->
  <rect x="165" y="38" width="8" height="20" rx="3" fill="#607D8B"/>
  <ellipse cx="169" cy="37" rx="6" ry="4" fill="#90A4AE"/>
  <!-- Wheels -->
  <circle cx="45" cy="116" r="18" fill="#212121"/>
  <circle cx="45" cy="116" r="11" fill="#37474F"/>
  <circle cx="45" cy="116" r="5" fill="#78909C"/>
  <circle cx="90" cy="116" r="18" fill="#212121"/>
  <circle cx="90" cy="116" r="11" fill="#37474F"/>
  <circle cx="90" cy="116" r="5" fill="#78909C"/>
  <circle cx="155" cy="116" r="18" fill="#212121"/>
  <circle cx="155" cy="116" r="11" fill="#37474F"/>
  <circle cx="155" cy="116" r="5" fill="#78909C"/>
  <!-- Front bumper -->
  <rect x="166" y="82" width="16" height="23" rx="4" fill="#E65100"/>
</svg>
