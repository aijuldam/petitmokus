  <ellipse cx="115" cy="38" rx="10" ry="5" fill="#CFD8DC"/>
  <rect x="105" y="36" width="20" height="6" rx="3" fill="#90A4AE"/>
  <!-- Exhaust glow -->
  <ellipse cx="95" cy="105" rx="5" ry="3" fill="#FFA726" opacity="0.5"/>
