<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <!-- Sky hint -->
  <ellipse cx="160" cy="30" rx="30" ry="12" fill="#E3F2FD" opacity="0.6"/>
  <ellipse cx="40" cy="20" rx="20" ry="8" fill="#E3F2FD" opacity="0.5"/>
  <!-- Main fuselage -->
  <path d="M20 68 Q30 60 80 60 L170 65 Q185 67 188 72 Q185 78 170 80 L80 80 Q30 80 20 72Z" fill="#ECEFF1"/>
  <!-- Nose -->
