  <ellipse cx="150" cy="70" rx="5" ry="4" fill="#B3E5FC"/>
  <ellipse cx="132" cy="70" rx="5" ry="4" fill="#B3E5FC"/>
  <ellipse cx="114" cy="70" rx="5" ry="4" fill="#B3E5FC"/>
  <ellipse cx="96" cy="70" rx="5" ry="4" fill="#B3E5FC"/>
  <ellipse cx="78" cy="70" rx="5" ry="4" fill="#B3E5FC"/>
  <ellipse cx="60" cy="70" rx="5" ry="4" fill="#B3E5FC"/>
  <!-- Color stripe -->
  <rect x="20" y="70" width="174" height="4" rx="2" fill="#1565C0"/>
  <!-- Main wings -->
  <path d="M90 68 L110 30 L130 34 L115 70Z" fill="#B0BEC5"/>
